AWSTemplateFormatVersion: "2010-09-09"
Description: "Network + ECS/ALB/RDS layer for RevivalBookStoreNeo (single stack)"

# このテンプレートが作るもの:
#   VPC 1個
#   ├─ パブリックサブネット ×2 (AZ分散) ← ALBが住む
#   ├─ プライベートサブネット ×2       ← ECS(アプリ)とRDSが住む
#   ├─ IGW + NATゲートウェイ
#   ├─ セキュリティグループ ×3 (ALB / ECS / RDS)
#   ├─ ALB + ターゲットグループ + リスナー (80番で受けてECSに転送)
#   ├─ ECSクラスタ + Fargateタスク定義 + ECSサービス (アプリ本体)
#   └─ RDS(PostgreSQL) + DBサブネットグループ
#
# 「パブリック/プライベート」の違いはルートテーブルだけで決まる。
#   パブリックサブネット = インターネットゲートウェイ(IGW)への経路を持つ
#   プライベートサブネット = NATゲートウェイ経由でしか外に出られない(直接インターネットからは入れない)
#
# ECS/ALB/RDSも同一テンプレートにまとめているので、Outputs/Exportは使わず
# 全部!Refで直接参照している。

Parameters:
  ProjectName:
    Type: String
    Default: revival-bookstore
  Environment:
    Type: String
    AllowedValues: [dev, prd]
    Default: dev

  # ---------- ECS関連 ----------
  ContainerImage:
    Type: String
    Description: "ECRのイメージURI (例: 123456789012.dkr.ecr.ap-northeast-1.amazonaws.com/revival-bookstore:latest)"
  ContainerPort:
    Type: Number
    Default: 8080   # RevivalBookStoreNeoのSpring Bootアプリが待ち受けるポート
  DesiredCount:
    Type: Number
    Default: 1      # 起動しておくタスク(コンテナ)の数

  # ---------- RDS関連 ----------
  DBName:
    Type: String
    Default: revivalbookstoreneo
  DBUsername:
    Type: String
    Default: postgres
  DBPassword:
    Type: String
    NoEcho: true    # テンプレートのパラメータ入力欄やログにパスワードが表示されないようにする
    MinLength: 8
    Description: "RDSのマスターパスワード(8文字以上)。本番では手入力ではなくSecrets Managerの利用を推奨。"
  DBInstanceClass:
    Type: String
    Default: db.t3.micro   # 開発用の一番小さいインスタンスクラス

Resources:
  # ============================================================
  # VPC本体
  # AWS上に作る「自分専用の仮想ネットワーク」の箱。
  # 10.0.0.0/16 = 10.0.0.0 ～ 10.0.255.255 の約6万5千個のIPアドレスを持てる範囲。
  # この中を後でサブネット(/24など)に切り分けて使う。
  # ============================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true    # VPC内でAWSのDNS解決を使えるようにする
      EnableDnsHostnames: true  # EC2などにパブリックDNS名を自動で割り当てる
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-vpc"

  # ============================================================
  # パブリックサブネット (ALBを置く場所)
  # 「パブリック」なのは後述のPublicRouteTableでIGWに繋がっているから。
  # AZ(アベイラビリティゾーン)を2つに分けるのは、片方のデータセンターが
  # 落ちてももう片方で動き続けられるようにするため(冗長化)。
  # ============================================================
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24         # 10.0.0.0 ～ 10.0.0.255 (256個)
      AvailabilityZone: !Select [0, !GetAZs ""]  # そのリージョンの1つ目のAZを自動選択
      MapPublicIpOnLaunch: true      # ここに置いたインスタンスに自動でパブリックIPを付与
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]  # 2つ目のAZ(PublicSubnet1とは別の場所)
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-public-2"

  # ============================================================
  # プライベートサブネット (ECS/アプリ・RDSを置く場所)
  # IGWへの経路を持たないので、インターネットから直接アクセスできない。
  # 外向きの通信(ライブラリのダウンロード等)はNATゲートウェイ経由で行う。
  # ここにDBやアプリ本体を置くことで、外部から直接叩かれるリスクを減らす。
  # ============================================================
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-${Environment}-private-2"

  # ============================================================
  # インターネットゲートウェイ (IGW)
  # VPCとインターネットの間の「玄関口」。これ自体はVPCの外に浮いている部品で、
  # AttachGatewayでVPCにくっつけて初めて使えるようになる。
  # ============================================================
  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ============================================================
  # NATゲートウェイ
  # プライベートサブネット(ECS/RDS)から外(インターネット)へ一方通行で
  # 出ていくための中継地点。「外からは来れないが、中からは出られる」を実現する。
  # NAT自体はパブリックサブネットに置く必要がある(玄関=IGWに直接繋がる場所にいないと
  # 外に出られないため)。EIPは固定のパブリックIPアドレス。
  # 今回はコスト節約のため1台だけ(=そのAZが落ちるとプライベート側の外向き通信も止まる)。
  # 本番で可用性を上げたい場合はAZごとに1台ずつ(2台)にする。
  # ============================================================
  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1   # パブリックサブネットに置く

  # ============================================================
  # ルートテーブル
  # 「このサブネットから0.0.0.0/0(=どこでも)宛の通信は、どこ経由で送るか」を決める表。
  # サブネットが「パブリックかプライベートか」は、この経路の中身で決まる。
  # ============================================================

  # --- パブリック用: 0.0.0.0/0 → IGW ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway   # IGWがVPCに接続完了してからルートを作る必要がある
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # パブリックサブネット2つに、上のルートテーブルを紐付ける
  PublicSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --- プライベート用: 0.0.0.0/0 → NATゲートウェイ ---
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # プライベートサブネット2つに、上のルートテーブルを紐付ける
  PrivateSubnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ============================================================
  # セキュリティグループ (SG)
  # インスタンス単位のファイアウォール。「誰からの通信を許可するか」を定義する。
  # ここでは ALB ← ECS ← RDS という一本道の通信だけを許可し、
  # 各層は「一つ内側のSGからしか話しかけられない」ようにしている(多層防御)。
  # ============================================================

  # ALB: インターネットから直接HTTPを受け付ける唯一の入口
  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ALB: allow HTTP from internet"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0   # 誰からでもOK (インターネット全体)

  # ECS: ALBからの通信だけ受け付ける(インターネットから直接は叩けない)
  EcsSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ECS: allow traffic from ALB only"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080          # アプリのコンテナが待ち受けるポート
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSG   # IPではなく「AlbSGが付いているものからだけ」許可

  # RDS: ECSからの通信だけ受け付ける(ECS以外は誰も繋げない)
  RdsSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "RDS: allow PostgreSQL from ECS only"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432          # PostgreSQLのデフォルトポート
          ToPort: 5432
          SourceSecurityGroupId: !Ref EcsSG   # 「EcsSGが付いているものからだけ」許可

  # ============================================================
  # ALB (Application Load Balancer)
  # インターネットからの通信を受け付けて、ECSタスクに振り分ける役目。
  # パブリックサブネットに配置し、AlbSGで80番だけ開けている。
  # ============================================================
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb"
      Scheme: internet-facing        # インターネットに公開する
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSG

  # ALBが転送した先のグループ。ここに実際のECSタスク(コンテナ)が登録される。
  # TargetType: ip = Fargateではタスクごとに個別IPが振られるため、IPで直接登録する方式にする。
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-tg"
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /            # アプリのトップページで死活監視
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ALBの80番ポートに来た通信を、上のTargetGroupに転送するルール
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ============================================================
  # ECSクラスタ
  # Fargateタスクをまとめる論理的な箱。Fargateの場合、裏側のサーバー管理はAWS任せになる。
  # ============================================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-${Environment}-cluster"

  # ECSタスク(コンテナ)の標準出力・標準エラーの送り先。
  # これが無いとログがどこにも残らず、アプリが落ちた時に原因調査ができなくなる。
  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-${Environment}"
      RetentionInDays: 14

  # ECSがタスク起動時に「ECRからイメージを取ってくる」「CloudWatch Logsに書き込む」
  # ために代わりに使う権限(IAMロール)。アプリ自体の権限ではなく、ECSの裏方作業用。
  # ※ TaskRole(次項)とは別物。ExecutionRoleは「ECSがタスクを起動するための権限」、
  #   TaskRoleは「起動したあとアプリのコード自身が使う権限」で役割が違う。
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # アプリ(RevivalBookStoreNeo)自身がAWS SDK経由でS3にアクセスする時に使う権限。
  # コード側にアクセスキー/シークレットキーを書く必要は一切ない。
  # ECSがこのロールの一時的な認証情報をタスクに自動で配布してくれるので、
  # AWS SDKのデフォルトの認証情報プロバイダ(DefaultCredentialsProvider)が
  # 自動的にこれを拾って使う。
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BookImagesBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${BookImagesBucket.Arn}/*"   # バケットの中身(オブジェクト)への操作
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt BookImagesBucket.Arn        # バケット自体の一覧取得

  # ============================================================
  # タスク定義
  # 「どのイメージを」「どれくらいのCPU/メモリで」「どのポートで」「どんな環境変数で」
  # 動かすかを書いた設計図。DBの接続情報はRevivalBookStoreNeoのapplication.propertiesが
  # 見ている DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASSWORD をそのまま環境変数で渡している。
  # ============================================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-${Environment}-task"
      Cpu: "256"                    # 0.25 vCPU (Fargateの最小クラス)
      Memory: "512"                 # 512MB
      NetworkMode: awsvpc           # Fargateは必ずawsvpc(タスクごとに専用ENI/IP)
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn   # アプリのコードが使うS3アクセス権限はこちら
      ContainerDefinitions:
        - Name: app
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: DB_HOST
              Value: !GetAtt RdsInstance.Endpoint.Address
            - Name: DB_PORT
              Value: !GetAtt RdsInstance.Endpoint.Port
            - Name: DB_NAME
              Value: !Ref DBName
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: S3_BUCKET_NAME
              Value: !Ref BookImagesBucket
            - Name: AWS_REGION
              Value: !Ref AWS::Region
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app

  # ============================================================
  # ECSサービス
  # 「TaskDefinitionの内容のタスクを、常にDesiredCount個起動し続ける」ことを保証する管理者役。
  # タスクが落ちたら自動で立て直し、ALBのTargetGroupへの登録・解除も面倒を見る。
  # プライベートサブネットに置くので、インターネットから直接は繋がらず、ALB経由のみ。
  # ============================================================
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: AlbListener   # リスナーができる前にサービスを起動しようとして失敗するのを防ぐ
    Properties:
      ServiceName: !Sub "${ProjectName}-${Environment}-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref EcsSG
          AssignPublicIp: DISABLED   # プライベートサブネットなのでパブリックIPは不要
      LoadBalancers:
        - ContainerName: app
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

  # ============================================================
  # RDS (PostgreSQL)
  # プライベートサブネットの2つにまたがるサブネットグループを作り、その中にDBを置く。
  # RdsSGにより、EcsSGが付いたもの(=ECSタスク)からしか5432番に繋げない。
  # ============================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${ProjectName}-${Environment}-db-subnet-group"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RdsInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot   # スタック削除時、DBは自動でスナップショットを残してから消す(誤削除対策)
    Properties:
      DBInstanceIdentifier: !Sub "${ProjectName}-${Environment}-db"
      Engine: postgres
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSG
      PubliclyAccessible: false   # インターネットから直接繋げない(ECS経由のみ)
      MultiAZ: false              # 開発用は単一AZ。本番で可用性を上げるならtrueにする

  # ============================================================
  # S3バケット (本の表紙画像の保存先)
  # バケット名はグローバルで一意にする必要があるため、AWSアカウントIDを末尾に付けている。
  # 誰でも読めるようにはせず(BlockPublicAccessを全部true)、非公開バケットとして作る。
  # アプリからは署名付きURL(presigned URL)を発行して一時的にアクセスさせる方式を想定。
  # ============================================================
  BookImagesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain   # スタック削除時にバケットごと画像が消えるのを防ぐ(空でないと削除もできない)
    Properties:
      BucketName: !Sub "${ProjectName}-${Environment}-book-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256   # 保存時に自動暗号化
      VersioningConfiguration:
        Status: Enabled   # 誤って上書き/削除しても古い画像を復元できるようにする
