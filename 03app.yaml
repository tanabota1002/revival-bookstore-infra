AWSTemplateFormatVersion: "2010-09-09"
Description: "RevivalBookStoreNeo-App Layer (ALB, ECS, WAF)"

Parameters:
  ProjectName:
    Type: String
    Default: revival-bookstore
  Environment:
    Type: String
    AllowedValues: [dev, prd]
    Default: dev
  CertificateArn:
    Type: String
    Description: "ACM証明書のARN。入力すると自動的にHTTPS(443)が有効になります。"
    Default: ""
  ContainerImage:
    Type: String
    Description: "ECRのイメージURI"
  ContainerPort:
    Type: Number
    Default: 8080
  DesiredCount:
    Type: Number
    Default: 0

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]

Resources:
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-PublicSubnet1Id"
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-PublicSubnet2Id"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-AlbSgId"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-tg"
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-${Environment}-VpcId"
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: "HTTPS"
              Port: "443"
              StatusCode: "HTTP_301"
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  AlbListenerHTTPS:
    Condition: HasCertificate
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${ProjectName}-${Environment}-webacl"
      Description: "WAF for ALB with AWS Managed Rules"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${ProjectName}-${Environment}-webacl-metric"
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSetMetric

  WafAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref Alb
      WebACLArn: !GetAtt WafWebAcl.Arn

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-${Environment}-cluster"

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-${Environment}"
      RetentionInDays: 14

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DBSecretArn"

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BookImagesBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub
                  - "${BucketArn}/*"
                  - BucketArn:
                      Fn::ImportValue: !Sub "${ProjectName}-${Environment}-BookImagesBucketArn"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  Fn::ImportValue: !Sub "${ProjectName}-${Environment}-BookImagesBucketArn"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-${Environment}-task"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: DB_HOST
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-RdsEndpointAddress"
            - Name: DB_PORT
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-RdsEndpointPort"
            - Name: DB_NAME
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DBName"
            - Name: DB_USER
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DBUsername"
            - Name: S3_BUCKET_NAME
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-BookImagesBucketName"
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: JDK_JAVA_OPTIONS
              Value: "-XX:MaxRAMPercentage=75.0"
          Secrets:
            - Name: DB_PASSWORD
              ValueFrom:
                Fn::ImportValue: !Sub "${ProjectName}-${Environment}-DBSecretArn"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: AlbListenerHTTP
    Properties:
      ServiceName: !Sub "${ProjectName}-${Environment}-service"
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 180
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-${Environment}-EcsSgId"
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: app
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

  EcsAutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: EcsService
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub 'service/${EcsCluster}/${ProjectName}-${Environment}-service'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'

  EcsCpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${ProjectName}-${Environment}-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref EcsAutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization